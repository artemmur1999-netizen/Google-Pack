<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VT Widget</title>
<style>
#vt {
    width: 100px;
    height: 100px;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}
.score {
    font-size: 32px;
    font-weight: bold;
}
body{
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>
<body>

<div id="vt">
    <center>
        <div>VirusTotal API</div>
        <div class="score" id="score">...</div>
    </center>
</div>

<script>
const HASH = "be770d05e341b14cac01a93411deab5a5cb42fc0388e904a8bf7a3427bcf232b";
const API_KEY = "2dc9b35f9c0ac0fc8dbf4cff026894848e9324c3bfbddcf50643a2e8ca4189e2";

fetch(`https://www.virustotal.com/api/v3/files/${HASH}`, {
    headers: {
        "x-apikey": API_KEY
    }
})
.then(r => r.json())
.then(data => {
    const stats = data.data.attributes.last_analysis_stats;
    const malicious = stats.malicious || 0;

    const total =
    (stats.harmless || 0) +
    (stats.malicious || 0) +
    (stats.suspicious || 0) +
    (stats.undetected || 0);

    document.getElementById("score").textContent =
        `${malicious}/${total}`;
})
.catch(() => {
    document.getElementById("score").textContent = "Ошибка";
});
</script>

</body>
</html>
